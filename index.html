<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ためコ — 稼ぐ節約ゲーム</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="ためコ" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.17.0/dist/tabler-icons.min.css" />
<style>
  :root{
    --color-background-primary:#232323;
    --color-background-secondary:#181818;
    --color-background-tertiary:#0e0e0e;
    --color-text-primary:#f3f2ec;
    --color-text-secondary:#b4b2a9;
    --color-text-tertiary:#8a8980;
    --color-text-info:#85b7eb;
    --color-background-info:#10314f;
    --color-text-success:#5dcaa5;
    --color-background-success:#103a30;
    --color-text-danger:#f09595;
    --color-border-tertiary:rgba(255,255,255,0.14);
    --color-border-secondary:rgba(255,255,255,0.26);
    --border-radius-md:8px;
    --border-radius-lg:12px;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  html{color-scheme:dark;}
  *{box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--color-background-tertiary);
    color:var(--color-text-primary);
    margin:0; padding:16px 12px; line-height:1.6;
    -webkit-text-size-adjust:100%;
  }
  input,select,textarea,button{font-family:inherit; font-size:14px; color:var(--color-text-primary);}
  input[type=number],input[type=text],select{
    height:36px; padding:4px 10px; border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md); background:var(--color-background-primary);
  }
  textarea{
    padding:8px 10px; border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md); background:var(--color-background-primary);
  }
  button{
    cursor:pointer; padding:6px 10px; border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md); background:transparent; color:var(--color-text-primary);
    transition:background .12s,transform .05s;
  }
  button:hover{background:var(--color-background-secondary);}
  button:active{transform:scale(0.98);}
  input:focus,select:focus,textarea:focus{outline:none; box-shadow:0 0 0 2px var(--color-text-info);}
</style>
</head>
<body>

<div style="background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:1.25rem; max-width:420px; margin:0 auto;">

  <div style="text-align:center; margin-bottom:12px;">
    <div style="font-size:22px; font-weight:500;">ためコ</div>
    <div style="font-size:12px; color:var(--color-text-secondary);">使わなかったお金は、稼いだお金。</div>
  </div>

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1.25rem; text-align:center; margin-bottom:12px;">
    <div id="creature" style="color:#AED581; line-height:1; margin-bottom:6px;"><i class="ti ti-seeding" style="font-size:64px;" aria-hidden="true"></i></div>
    <div style="font-size:18px; font-weight:500;" id="stageName">たね</div>
    <div style="font-size:13px; color:var(--color-text-secondary); margin-top:2px;">レベル <span id="level">1</span> ・ 相棒「ためコ」</div>
    <div style="margin-top:12px;">
      <div style="height:8px; background:var(--color-background-tertiary); border-radius:99px; overflow:hidden;">
        <div id="xpBar" style="height:100%; width:0%; background:#97C459; border-radius:99px;"></div>
      </div>
      <div style="font-size:12px; color:var(--color-text-tertiary); margin-top:4px;">次のレベルまで あと <span id="xpRemain">2,000</span>円</div>
    </div>
  </div>

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem; margin-bottom:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <span style="font-size:13px; color:var(--color-text-secondary);"><i class="ti ti-target" style="vertical-align:-2px;" aria-hidden="true"></i> 今月の目標</span>
      <span style="font-size:13px;">¥<input type="number" id="goal" value="5000" min="1" style="width:80px; height:28px; padding:2px 6px; text-align:right; display:inline-block;" /></span>
    </div>
    <div style="height:10px; background:var(--color-background-tertiary); border-radius:99px; overflow:hidden;">
      <div id="goalBar" style="height:100%; width:0%; background:#1D9E75; border-radius:99px;"></div>
    </div>
    <div style="font-size:12px; color:var(--color-text-tertiary); margin-top:5px;">今月 <span id="monthTotal" style="color:#5DCAA5; font-weight:500;">¥0</span> 稼いだ ・ 達成率 <span id="goalPct">0</span>%</div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
    <div style="background:var(--color-background-primary); border-radius:var(--border-radius-md); padding:10px 6px; text-align:center;">
      <div style="font-size:12px; color:var(--color-text-secondary);">累計で稼いだ</div>
      <div style="font-size:18px; font-weight:500;" id="total">¥0</div>
    </div>
    <div style="background:var(--color-background-primary); border-radius:var(--border-radius-md); padding:10px 6px; text-align:center;">
      <div style="font-size:12px; color:var(--color-text-secondary);"><i class="ti ti-flame" style="font-size:13px; vertical-align:-1px;" aria-hidden="true"></i> 連続</div>
      <div style="font-size:18px; font-weight:500; color:#D85A30;"><span id="streak">0</span><span style="font-size:12px;">日</span></div>
    </div>
  </div>

  <div style="background:var(--color-background-info); border-radius:var(--border-radius-lg); padding:1rem; margin-bottom:12px;">
    <div style="font-size:13px; color:var(--color-text-info); margin-bottom:4px;"><i class="ti ti-trending-up" style="vertical-align:-2px;" aria-hidden="true"></i> もし年利5%で20年運用したら…</div>
    <div style="font-size:26px; font-weight:500; color:var(--color-text-info);" id="future">¥0</div>
    <div style="font-size:11px; color:var(--color-text-info); opacity:0.85; margin-top:4px;">年利5%・複利で20年運用した場合の概算（約2.65倍）</div>
  </div>

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem; margin-bottom:12px;">
    <div style="font-size:13px; color:var(--color-text-secondary); margin-bottom:8px;">使わずに済んだ＝稼いだ金額</div>
    <div style="display:flex; gap:8px; margin-bottom:8px;">
      <input type="number" id="amount" placeholder="金額" min="1" style="width:100px;" />
      <select id="cat" style="flex:1;">
        <option value="コンビニ">コンビニ</option>
        <option value="カフェ">カフェ</option>
        <option value="お菓子">お菓子</option>
        <option value="外食">外食</option>
        <option value="衝動買い">衝動買い</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <input type="text" id="memo" placeholder="メモ（任意）" style="width:100%; margin-bottom:8px;" />
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;">
      <button class="quick" data-v="150">¥150</button>
      <button class="quick" data-v="500">¥500</button>
      <button class="quick" data-v="1000">¥1,000</button>
      <button class="quick" data-v="3000">¥3,000</button>
    </div>
    <button id="logBtn" style="width:100%; border:0.5px solid var(--color-border-secondary); background:var(--color-background-success); color:var(--color-text-success); font-weight:500; padding:10px;"><i class="ti ti-coin" style="vertical-align:-2px;" aria-hidden="true"></i> 稼いだ！記録する</button>
    <div id="cheer" style="font-size:13px; color:#97C459; text-align:center; margin-top:8px; min-height:18px;"></div>
  </div>

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem; margin-bottom:12px;">
    <div style="font-size:13px; color:var(--color-text-secondary); margin-bottom:8px;"><i class="ti ti-calendar-stats" style="vertical-align:-2px;" aria-hidden="true"></i> 月別の記録（毎月積み上げ）</div>
    <div id="monthBreak" style="font-size:13px;"></div>
  </div>

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem; margin-bottom:12px;">
    <div style="font-size:13px; color:var(--color-text-secondary); margin-bottom:8px;"><i class="ti ti-chart-bar" style="vertical-align:-2px;" aria-hidden="true"></i> 稼いだ内訳（カテゴリ別・累計）</div>
    <div id="catBreak" style="font-size:13px;"></div>
  </div>

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:1rem; margin-bottom:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <span style="font-size:13px; color:var(--color-text-secondary);">稼いだ記録</span>
      <button id="resetBtn" style="font-size:12px; padding:2px 8px;" aria-label="記録をリセット"><i class="ti ti-refresh" aria-hidden="true"></i></button>
    </div>
    <div id="history" style="font-size:13px;"></div>
  </div>

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-lg); padding:1rem;">
    <div style="font-size:13px; color:var(--color-text-secondary); margin-bottom:6px;"><i class="ti ti-device-floppy" style="vertical-align:-2px;" aria-hidden="true"></i> バックアップ（記録を守る）</div>
    <textarea id="backupBox" rows="3" placeholder="「書き出す」を押すと、ここに記録データが出ます。コピーしてメモ等に保管してください。復元するときはここに貼って「復元する」。" style="width:100%; font-family:var(--font-mono); font-size:12px; resize:vertical;"></textarea>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <button id="exportBtn" style="flex:1;"><i class="ti ti-upload" style="vertical-align:-2px;" aria-hidden="true"></i> 書き出す</button>
      <button id="importBtn" style="flex:1;"><i class="ti ti-download" style="vertical-align:-2px;" aria-hidden="true"></i> 復元する</button>
    </div>
    <div id="backupMsg" style="font-size:12px; color:var(--color-text-tertiary); margin-top:8px; min-height:16px;"></div>
  </div>

</div>

<script>
(function(){
  var KEY='tameco_v2';
  var RATE=0.05, YEARS=20, FACTOR=Math.pow(1+RATE,YEARS);
  var stages=[
    {min:1,name:'たね',icon:'ti-seeding',color:'#AED581',size:64},
    {min:3,name:'めばえ',icon:'ti-leaf',color:'#9CCC65',size:72},
    {min:5,name:'ふたば',icon:'ti-plant',color:'#7CB342',size:80},
    {min:8,name:'ぐんぐん期',icon:'ti-plant-2',color:'#66BB6A',size:90},
    {min:12,name:'つぼみ',icon:'ti-flower',color:'#F48FB1',size:96},
    {min:16,name:'まんかい',icon:'ti-flower',color:'#FF77A9',size:104}
  ];
  var cheers=['ナイス！しっかり稼いだな！','うまい！それは立派な稼ぎだ！','使わなかった分が、君の収入だ！','見事！未来の自分への先取りだ！','よし、今日も稼いだぞ！'];
  var catColors={'コンビニ':'#378ADD','カフェ':'#BA7517','お菓子':'#D4537E','外食':'#D85A30','衝動買い':'#7F77DD','その他':'#888780'};
  var STEP=2000;
  var s=load();

  function load(){
    try{var d=JSON.parse(localStorage.getItem(KEY));if(d){if(!d.goal)d.goal=5000;return d;}}catch(e){}
    return {goal:5000,total:0,streak:0,lastDate:null,log:[]};
  }
  function save(){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
  function levelOf(t){return Math.floor(t/STEP)+1;}
  function stageOf(lv){var r=stages[0];for(var i=0;i<stages.length;i++){if(lv>=stages[i].min)r=stages[i];}return r;}
  function now(){var d=new Date();return {full:d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(),month:d.getFullYear()+'-'+(d.getMonth()+1)};}
  function daysBetween(a,b){var pa=a.split('-').map(Number),pb=b.split('-').map(Number);var da=new Date(pa[0],pa[1]-1,pa[2]),db=new Date(pb[0],pb[1]-1,pb[2]);return Math.round((db-da)/86400000);}
  function esc(t){return t.replace(/[<>&]/g,function(m){return{'<':'&lt;','>':'&gt;','&':'&amp;'}[m];});}
  function monthLabel(m){var p=m.split('-');return p[0]+'年'+p[1]+'月';}

  function render(){
    var lv=levelOf(s.total);
    var st=stageOf(lv);
    var c=document.getElementById('creature');
    c.innerHTML='<i class="ti '+st.icon+'" style="font-size:'+st.size+'px;" aria-hidden="true"></i>';
    c.style.color=st.color;
    document.getElementById('stageName').textContent=st.name;
    document.getElementById('level').textContent=lv;
    document.getElementById('total').textContent='¥'+s.total.toLocaleString();
    document.getElementById('streak').textContent=s.streak;
    document.getElementById('future').textContent='¥'+Math.round(s.total*FACTOR).toLocaleString();
    var into=s.total%STEP;
    document.getElementById('xpBar').style.width=Math.round(into/STEP*100)+'%';
    document.getElementById('xpRemain').textContent=(STEP-into).toLocaleString();

    var mk=now().month;
    var months={};
    s.log.forEach(function(e){months[e.month]=(months[e.month]||0)+e.amount;});
    var mTotal=months[mk]||0;
    var goal=s.goal||1;
    var pct=Math.min(100,Math.round(mTotal/goal*100));
    document.getElementById('monthTotal').textContent='¥'+mTotal.toLocaleString();
    document.getElementById('goalPct').textContent=pct;
    document.getElementById('goalBar').style.width=pct+'%';
    document.getElementById('goalBar').style.background=mTotal>=goal?'#9CCC65':'#1D9E75';

    var mkeys=Object.keys(months).sort(function(a,b){var pa=a.split('-').map(Number),pb=b.split('-').map(Number);return pb[0]-pa[0]||pb[1]-pa[1];});
    var mb=document.getElementById('monthBreak');
    if(!mkeys.length){mb.innerHTML='<div style="color:var(--color-text-tertiary);">まだ記録がありません。</div>';}
    else{
      var mmax=Math.max.apply(null,mkeys.map(function(k){return months[k];}));
      mb.innerHTML=mkeys.map(function(k){
        var hit=months[k]>=goal;
        return '<div style="margin-bottom:8px;"><div style="display:flex; justify-content:space-between; margin-bottom:2px;"><span>'+monthLabel(k)+(k===mk?' <span style="color:var(--color-text-tertiary);">(今月)</span>':'')+'</span><span style="font-weight:500;">¥'+months[k].toLocaleString()+(hit?' <i class="ti ti-check" style="color:#9CCC65;" aria-hidden="true"></i>':'')+'</span></div><div style="height:6px; background:var(--color-background-tertiary); border-radius:99px; overflow:hidden;"><div style="height:100%; width:'+Math.round(months[k]/mmax*100)+'%; background:#1D9E75; border-radius:99px;"></div></div></div>';
      }).join('');
    }

    var cats={};
    s.log.forEach(function(e){cats[e.cat]=(cats[e.cat]||0)+e.amount;});
    var arr=Object.keys(cats).map(function(k){return {k:k,v:cats[k]};}).sort(function(a,b){return b.v-a.v;});
    var cb=document.getElementById('catBreak');
    if(!arr.length){cb.innerHTML='<div style="color:var(--color-text-tertiary);">まだデータがありません。</div>';}
    else{
      var max=arr[0].v;
      cb.innerHTML=arr.map(function(o){
        var col=catColors[o.k]||'#888780';
        return '<div style="margin-bottom:7px;"><div style="display:flex; justify-content:space-between; margin-bottom:2px;"><span>'+o.k+'</span><span style="font-weight:500;">¥'+o.v.toLocaleString()+'</span></div><div style="height:6px; background:var(--color-background-tertiary); border-radius:99px; overflow:hidden;"><div style="height:100%; width:'+Math.round(o.v/max*100)+'%; background:'+col+'; border-radius:99px;"></div></div></div>';
      }).join('');
    }

    var h=document.getElementById('history');
    if(!s.log.length){h.innerHTML='<div style="color:var(--color-text-tertiary); padding:6px 0;">まだ記録がありません。最初の「稼ぎ」を記録しよう！</div>';return;}
    h.innerHTML=s.log.slice(0,12).map(function(e){
      var col=catColors[e.cat]||'#888780';
      return '<div style="display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-top:0.5px solid var(--color-border-tertiary);"><span style="color:var(--color-text-secondary);"><span style="display:inline-block; width:8px; height:8px; border-radius:99px; background:'+col+'; margin-right:5px;"></span>'+e.full+' ・'+e.cat+(e.memo?' '+esc(e.memo):'')+'</span><span style="font-weight:500; color:#97C459;">+¥'+e.amount.toLocaleString()+'</span></div>';
    }).join('');
  }

  function addLog(amount){
    if(!amount||amount<1)return;
    var prevLv=levelOf(s.total);
    var n=now();
    if(s.lastDate){var gap=daysBetween(s.lastDate,n.full);if(gap===1)s.streak+=1;else if(gap>1)s.streak=1;}
    else s.streak=1;
    s.lastDate=n.full;
    s.total+=amount;
    s.log.unshift({full:n.full,month:n.month,cat:document.getElementById('cat').value,memo:document.getElementById('memo').value.trim(),amount:amount});
    save();render();
    var cheer=cheers[Math.floor(Math.random()*cheers.length)];
    if(levelOf(s.total)>prevLv)cheer='レベルアップ！ためコが育ったぞ！';
    document.getElementById('cheer').textContent=cheer;
    document.getElementById('amount').value='';
    document.getElementById('memo').value='';
  }

  document.getElementById('goal').value=s.goal;
  document.getElementById('goal').addEventListener('change',function(){var v=parseInt(this.value,10);s.goal=(v&&v>0)?v:5000;this.value=s.goal;save();render();});
  document.getElementById('logBtn').addEventListener('click',function(){addLog(parseInt(document.getElementById('amount').value,10));});
  document.getElementById('amount').addEventListener('keydown',function(ev){if(ev.key==='Enter')addLog(parseInt(this.value,10));});
  Array.prototype.forEach.call(document.querySelectorAll('.quick'),function(b){b.addEventListener('click',function(){addLog(parseInt(b.getAttribute('data-v'),10));});});
  document.getElementById('resetBtn').addEventListener('click',function(){if(confirm('記録をすべて消しますか？（目標額は残ります）')){s.total=0;s.streak=0;s.lastDate=null;s.log=[];save();render();document.getElementById('cheer').textContent='';}});

  var msg=document.getElementById('backupMsg');
  document.getElementById('exportBtn').addEventListener('click',function(){
    var box=document.getElementById('backupBox');
    box.value=JSON.stringify(s);
    box.focus();box.select();
    msg.textContent='書き出しました。このテキストをコピーして、メモやLINEのKeepなどに保管してください。';
    msg.style.color='var(--color-text-success)';
  });
  document.getElementById('importBtn').addEventListener('click',function(){
    var box=document.getElementById('backupBox');
    var txt=box.value.trim();
    if(!txt){msg.textContent='復元するデータを枠に貼り付けてください。';msg.style.color='var(--color-text-danger)';return;}
    var d;
    try{d=JSON.parse(txt);}catch(e){msg.textContent='データの形式が正しくありません。書き出したテキストをそのまま貼ってください。';msg.style.color='var(--color-text-danger)';return;}
    if(typeof d.total!=='number'||!Array.isArray(d.log)){msg.textContent='これは「ためコ」のバックアップではないようです。';msg.style.color='var(--color-text-danger)';return;}
    if(!confirm('今の記録を、貼り付けたデータで置き換えますか？')){return;}
    s={goal:d.goal||5000,total:d.total,streak:d.streak||0,lastDate:d.lastDate||null,log:d.log};
    save();
    document.getElementById('goal').value=s.goal;
    render();
    msg.textContent='復元しました！記録が戻りました。';
    msg.style.color='var(--color-text-success)';
  });

  render();
})();
</script>
</body>
</html>
